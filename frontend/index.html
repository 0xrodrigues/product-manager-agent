<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Agent · Cielo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <div class="header-left">
        <div class="header-logo">
          <span class="logo-dot"></span>
        </div>
        <span class="header-title">PM Agent <span class="header-brand">· Cielo</span></span>
      </div>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">Conectando…</span>
      </div>
    </header>

    <main class="main">
      <div class="chat-container" id="chatContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-content">
            <h1 class="welcome-title">O que vamos refinar hoje?</h1>
            <p class="welcome-subtitle">Descreva uma história e eu estruturo tudo para você.</p>
            <div class="examples-grid">
              <button class="example-card" data-title="Onboarding de novo usuário" data-description="Precisamos criar um fluxo de onboarding para novos usuários que se cadastram pelo app mobile. Deve incluir validação de documentos via API do bureau de crédito e integração com o sistema de KYC.">
                <span class="example-icon">✦</span>
                <span class="example-title">Onboarding de novo usuário</span>
                <span class="example-desc">Fluxo de cadastro com validação de documentos e KYC</span>
              </button>
              <button class="example-card" data-title="Notificação de limite de crédito" data-description="Sistema de notificações push e email quando o cliente atinge 80% e 100% do limite do cartão de crédito. Integração com serviço de mensageria (SNS/SQS) e template engine.">
                <span class="example-icon">✦</span>
                <span class="example-title">Notificação de limite</span>
                <span class="example-desc">Alertas push e email para limite de crédito</span>
              </button>
              <button class="example-card" data-title="Relatório de conciliação" data-description="Relatório mensal de conciliação de transações entre o sistema de adquirência e o financeiro. Precisa exportar em CSV e PDF, com filtros por período e bandeira.">
                <span class="example-icon">✦</span>
                <span class="example-title">Relatório de conciliação</span>
                <span class="example-desc">Conciliação mensal com exportação CSV e PDF</span>
              </button>
              <button class="example-card" data-title="Contestação de transação" data-description="Fluxo para o portador do cartão contestar uma transação suspeita via app. Integração com sistema antifraude e API do emissor. Prazo de 48h para resposta automática.">
                <span class="example-icon">✦</span>
                <span class="example-title">Contestação de transação</span>
                <span class="example-desc">Fluxo de chargeback com antifraude integrado</span>
              </button>
            </div>
          </div>
        </div>

        <div class="messages-list" id="messagesList"></div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="Descreva uma história ou responda ao agente…"
            rows="1"
          ></textarea>
          <button class="send-button" id="sendButton" title="Enviar (Enter)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L14 8L8 14M2 8H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
